<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HWPro_OS</title>
    <style>
        /* === СБРОС И БАЗОВЫЙ МИНИМАЛИЗМ === */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --panel-bg: #000000;
            --text: #00cc00;
            --text-dim: #007700;
            --accent: #00ff00;
            --border: #005500;
            --highlight-bg: #003300;
            --highlight-text: #ffffff;
            --bar-bg: #001a00;
            --error: #00aa00;
            --font-mono: 'Courier New', 'Liberation Mono', 'DejaVu Sans Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.3;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            cursor: default;
        }

        /* === ВЕРХНЯЯ СТРОКА МЕНЮ Midnight Commander === */
        .mc-topbar {
            display: flex;
            align-items: center;
            height: 28px;
            background-color: var(--bar-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 8px;
            font-size: 13px;
            flex-shrink: 0;
        }

        .mc-topbar span {
            cursor: default;
            padding: 2px 8px;
            margin-right: 4px;
            color: var(--text-dim);
            transition: color 0.1s, background-color 0.1s;
        }

        .mc-topbar span:hover {
            color: var(--highlight-text);
            background-color: var(--highlight-bg);
        }

        .mc-topbar .hotkey {
            color: var(--accent);
            font-weight: bold;
        }

        /* === ОСНОВНАЯ ОБЛАСТЬ: ДВЕ ПАНЕЛИ === */
        .mc-panels {
            display: flex;
            flex: 1;
            min-height: 0;
            border-bottom: 1px solid var(--border);
        }

        .mc-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            min-width: 0;
        }

        .mc-panel:last-child {
            border-right: none;
        }

        /* === ЗАГОЛОВОК ПАНЕЛИ === */
        .panel-header {
            height: 26px;
            background-color: var(--bar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 13px;
            font-weight: bold;
            color: var(--highlight-text);
            flex-shrink: 0;
        }

        .panel-header .path {
            color: var(--text-dim);
            font-weight: normal;
            margin-left: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* === ТЕЛО ПАНЕЛИ (СПИСОК ФАЙЛОВ/ДИРЕКТОРИЙ) === */
        .panel-body {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2px 0;
            background-color: var(--panel-bg);
            font-size: 13px;
            line-height: 1.4;
            cursor: default;
        }

        .panel-body::-webkit-scrollbar {
            width: 6px;
        }
        .panel-body::-webkit-scrollbar-track {
            background: var(--bg);
        }
        .panel-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .file-row {
            display: flex;
            align-items: center;
            padding: 2px 8px;
            white-space: nowrap;
            transition: background-color 0.1s;
            min-height: 20px;
        }

        .file-row:hover,
        .file-row.selected {
            background-color: var(--highlight-bg);
            color: var(--highlight-text);
        }

        .file-row.selected {
            outline: 1px solid var(--accent);
            outline-offset: -1px;
        }

        .file-row .icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
            margin-right: 4px;
            color: var(--accent);
        }

        .file-row .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        .file-row.dir .name {
            color: var(--accent);
            font-weight: bold;
        }

        .file-row .size {
            width: 70px;
            text-align: right;
            flex-shrink: 0;
            color: var(--text-dim);
            margin-left: 8px;
        }

        .file-row.dir .size {
            color: var(--text-dim);
        }

        /* === НИЖНЯЯ СТРОКА ПОДСКАЗОК === */
        .mc-bottombar {
            height: 26px;
            background-color: var(--bar-bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .mc-bottombar .hint {
            margin-right: 16px;
            color: var(--text-dim);
        }

        .mc-bottombar .key {
            color: var(--accent);
            font-weight: bold;
            background-color: var(--highlight-bg);
            padding: 0 4px;
            margin-right: 4px;
        }

        /* === МОДАЛЬНОЕ ОКНО (ПРОСМОТР ФАЙЛА) === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-window {
            width: 75vw;
            max-width: 900px;
            height: 70vh;
            max-height: 700px;
            background-color: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
        }

        .modal-header {
            height: 26px;
            background-color: var(--bar-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 13px;
            color: var(--highlight-text);
        }

        .modal-header .close-btn {
            margin-left: auto;
            cursor: pointer;
            padding: 0 6px;
            color: var(--text-dim);
            transition: color 0.1s;
        }

        .modal-header .close-btn:hover {
            color: var(--highlight-text);
            background-color: var(--highlight-bg);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text);
            background-color: var(--panel-bg);
        }

        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: var(--bg);
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .modal-body h2 {
            color: var(--accent);
            font-size: 15px;
            margin: 18px 0 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .modal-body h2:first-child {
            margin-top: 0;
        }

        .modal-body p {
            margin: 6px 0;
        }

        .modal-body ul {
            list-style: none;
            padding-left: 0;
            margin: 8px 0;
        }

        .modal-body ul li::before {
            content: ">";
            color: var(--accent);
            margin-right: 8px;
        }

        .modal-body .highlight {
            color: var(--accent);
            font-weight: bold;
        }

        .modal-body .email-link {
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }

        .modal-body .terminal-line {
            display: block;
            color: var(--text-dim);
            margin: 2px 0;
        }

        /* === АДАПТИВНОСТЬ === */
        @media (max-width: 700px) {
            .mc-panels {
                flex-direction: column;
            }
            .mc-panel {
                flex: 1;
                min-height: 0;
            }
            .mc-panel:first-child {
                border-bottom: 1px solid var(--border);
            }
            .file-row .size {
                display: none;
            }
            .modal-window {
                width: 95vw;
                height: 85vh;
            }
        }
    </style>
</head>

                changelog: `
                    <h2>CHANGELOG.md</h2>
                    <p>2026-04-27 — Публичный анонс HWPro_OS.</p>
                    <p>2026-04-26 — Публикация правил подачи заявок.</p>
                    <p>2026-04-25 — Выход ядра 7.0. Закладка фундамента HWPro_OS.</p>
                    <p>2026-Q1 — Начало внутренней разработки.</p>
                `,
            };

            // ===== ОТРИСОВКА ПАНЕЛИ =====
            function renderPanel(containerId, files, panelSide) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = '';

                files.forEach((file, index) => {
                    const row = document.createElement('div');
                    row.className = 'file-row' + (file.type === 'dir' ? ' dir' : '');
                    row.dataset.index = index;
                    row.dataset.panel = panelSide;
                    row.dataset.contentId = file.contentId || '';
                    row.dataset.type = file.type;
                    row.tabIndex = 0;

                    const iconSpan = document.createElement('span');
                    iconSpan.className = 'icon';
                    iconSpan.innerHTML = file.icon;

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'name';
                    nameSpan.textContent = file.name;

                    const sizeSpan = document.createElement('span');
                    sizeSpan.className = 'size';
                    sizeSpan.textContent = file.size;

                    row.appendChild(iconSpan);
                    row.appendChild(nameSpan);
                    row.appendChild(sizeSpan);

                    row.addEventListener('click', function(e) {
                        selectRow(row, panelSide);
                        if (file.type === 'file' && file.contentId) {
                            openModal(file.contentId, file.name);
                        }
                    });

                    row.addEventListener('dblclick', function(e) {
                        if (file.type === 'file' && file.contentId) {
                            openModal(file.contentId, file.name);
                        }
                    });

                    container.appendChild(row);
                });

                // Автовыделение первой строки (кроме "..")
                const firstRealRow = container.querySelector('.file-row:not(:first-child)');
                if (firstRealRow) {
                    selectRow(firstRealRow, panelSide);
                }
            }

            // ===== ВЫДЕЛЕНИЕ СТРОКИ =====
            let activePanel = 'left';
            let selectedIndex = { left: 1, right: 1 };

            function selectRow(row, panelSide) {
                const panelId = panelSide === 'left' ? 'left-panel' : 'right-panel';
                const container = document.getElementById(panelId);
                // Снять выделение со всех строк в этой панели
                container.querySelectorAll('.file-row').forEach(r => r.classList.remove('selected'));
                // Выделить текущую
                row.classList.add('selected');
                // Обновить индекс
                selectedIndex[panelSide] = parseInt(row.dataset.index);
                activePanel = panelSide;
            }

            // ===== МОДАЛЬНОЕ ОКНО =====
            function openModal(contentId, fileName) {
                const overlay = document.getElementById('modal-overlay');
                const title = document.getElementById('modal-title');
                const body = document.getElementById('modal-body');

                if (fileContents[contentId]) {
                    title.textContent = fileName;
                    body.innerHTML = fileContents[contentId];
                    overlay.classList.add('active');
                }
            }

            function closeModal() {
                const overlay = document.getElementById('modal-overlay');
                overlay.classList.remove('active');
            }

            document.getElementById('modal-close').addEventListener('click', closeModal);
            document.getElementById('modal-overlay').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });

            // ===== КЛАВИАТУРНАЯ НАВИГАЦИЯ =====
            document.addEventListener('keydown', function(e) {
                // Esc — закрыть модальное окно
                if (e.key === 'Escape') {
                    const overlay = document.getElementById('modal-overlay');
                    if (overlay.classList.contains('active')) {
                        closeModal();
                        return;
                    }
                }

                // Tab — переключение активной панели
                if (e.key === 'Tab') {
                    e.preventDefault();
                    activePanel = activePanel === 'left' ? 'right' : 'left';
                    highlightCurrentInActivePanel();
                    return;
                }

                // F3 — открыть файл
                if (e.key === 'F3' || e.key === 'f3') {
                    e.preventDefault();
                    openCurrentFile();
                    return;
                }

                // Enter — открыть файл
                if (e.key === 'Enter') {
                    e.preventDefault();
                    openCurrentFile();
                    return;
                }

                // Стрелки — навигация
                if (['ArrowUp', 'ArrowDown'].includes(e.key)) {
                    e.preventDefault();
                    const panelId = activePanel === 'left' ? 'left-panel' : 'right-panel';
                    const container = document.getElementById(panelId);
                    const rows = container.querySelectorAll('.file-row');
                    if (rows.length === 0) return;

                    let currentIdx = selectedIndex[activePanel];
                    if (e.key === 'ArrowUp' && currentIdx > 0) {
                        currentIdx--;
                    } else if (e.key === 'ArrowDown' && currentIdx < rows.length - 1) {
                        currentIdx++;
                    }
                    selectedIndex[activePanel] = currentIdx;
                    const targetRow = rows[currentIdx];
                    if (targetRow) {
                        selectRow(targetRow, activePanel);
                        targetRow.scrollIntoView({ block: 'nearest' });
                    }
                }
            });

            function highlightCurrentInActivePanel() {
                const panelId = activePanel === 'left' ? 'left-panel' : 'right-panel';
                const container = document.getElementById(panelId);
                const rows = container.querySelectorAll('.file-row');
                const idx = selectedIndex[activePanel];
                if (rows[idx]) {
                    selectRow(rows[idx], activePanel);
                    rows[idx].scrollIntoView({ block: 'nearest' });
                }
            }

            function openCurrentFile() {
                const panelId = activePanel === 'left' ? 'left-panel' : 'right-panel';
                const container = document.getElementById(panelId);
                const rows = container.querySelectorAll('.file-row');
                const idx = selectedIndex[activePanel];
                const row = rows[idx];
                if (row && row.dataset.type === 'file' && row.dataset.contentId) {
                    openModal(row.dataset.contentId, row.querySelector('.name').textContent);
                }
            }

            // ===== КЛИК ПО ПАНЕЛИ ДЛЯ ПЕРЕКЛЮЧЕНИЯ АКТИВНОСТИ =====
            document.getElementById('left-panel').addEventListener('click', function(e) {
                if (e.target.closest('.file-row')) return;
                activePanel = 'left';
                highlightCurrentInActivePanel();
            });
            document.getElementById('right-panel').addEventListener('click', function(e) {
                if (e.target.closest('.file-row')) return;
                activePanel = 'right';
                highlightCurrentInActivePanel();
            });

            // ===== ИНИЦИАЛИЗАЦИЯ =====
            renderPanel('left-panel', leftFiles, 'left');
            renderPanel('right-panel', rightFiles, 'right');
            activePanel = 'left';
            highlightCurrentInActivePanel();

            console.log('HWPro_OS — Midnight Commander Interface loaded.');
            console.log('No telemetry. No tracking. No cookies.');
            console.log('Use Arrows, Tab, Enter, F3, Esc.');
        })();
    </script>
</body>
</html>

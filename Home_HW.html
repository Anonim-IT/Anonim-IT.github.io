<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Моя навигационная панель | Центр всех сайтов</title>
    <!-- Шрифты Google Fonts для современного стиля -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (бесплатные иконки) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f7fc 0%, #e9eef4 100%);
            font-family: 'Inter', sans-serif;
            color: #1a2c3e;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* основной контейнер */
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* шапка с приветствием */
        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f4e6e, #2b7a62);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .hero h1 i {
            background: none;
            color: #2b7a62;
            font-size: 2.4rem;
        }

        .hero p {
            font-size: 1.2rem;
            color: #4a627a;
            margin-top: 0.7rem;
            font-weight: 400;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* поиск и фильтрация */
        .search-section {
            margin-bottom: 2.8rem;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-box {
            background: white;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            flex: 1;
            max-width: 480px;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .search-box:focus-within {
            box-shadow: 0 12px 28px rgba(33, 150, 83, 0.15);
            border-color: #2b7a62;
        }

        .search-box i {
            font-size: 1.2rem;
            color: #7f8c9a;
        }

        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 12px 0;
            background: transparent;
            font-weight: 500;
            color: #1f2f3e;
        }

        .search-box input::placeholder {
            color: #b4c0ce;
            font-weight: 400;
        }

        /* кнопки категорий */
        .categories {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .cat-btn {
            background: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            color: #2c4c6e;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        .cat-btn i {
            font-size: 0.9rem;
        }

        .cat-btn.active {
            background: #1f4e6e;
            color: white;
            border-color: #1f4e6e;
            box-shadow: 0 6px 12px rgba(31,78,110,0.2);
        }

        .cat-btn:hover:not(.active) {
            background: #eef3fc;
            border-color: #bdd4e7;
            transform: translateY(-2px);
        }

        /* сетка карточек */
        .sites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
            margin-top: 0.8rem;
        }

        /* карточка сайта */
        .site-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 1.2rem 1.2rem 1.4rem 1.2rem;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .site-card:hover {
            transform: translateY(-6px);
            background: white;
            box-shadow: 0 24px 42px rgba(0, 0, 0, 0.12);
            border-color: #cbdde9;
        }

        /* верхняя часть иконки + заголовок */
        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 1rem;
        }

        .icon-bg {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #eef5ff, #e0f0ea);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #226653;
            transition: 0.2s;
        }

        .site-card:hover .icon-bg {
            background: linear-gradient(135deg, #e0f0ea, #d4e9ff);
            transform: scale(0.98);
        }

        .card-title h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1c3a4f;
            letter-spacing: -0.3px;
        }

        .card-title .category-tag {
            font-size: 0.7rem;
            background: #eef2f8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 6px;
            color: #2c6b56;
            font-weight: 500;
            letter-spacing: normal;
        }

        .site-description {
            font-size: 0.85rem;
            color: #527a9b;
            line-height: 1.4;
            margin: 0.5rem 0 1rem;
            display: flex;
            flex: 1;
        }

        .site-url {
            font-family: monospace;
            font-size: 0.75rem;
            background: #f0f4f9;
            padding: 6px 10px;
            border-radius: 14px;
            color: #386a5c;
            margin-bottom: 1rem;
            word-break: break-all;
            transition: 0.1s;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.25rem;
        }

        .visit-btn {
            background: none;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1f6e5c;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .visit-btn i {
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .visit-btn:hover {
            background: #e2f0ec;
            color: #0b4e3f;
        }

        .visit-btn:hover i {
            transform: translateX(4px);
        }

        /* пустое состояние */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255,255,240,0.5);
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .empty-state i {
            font-size: 3.5rem;
            color: #8da6bd;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 1.2rem;
            color: #5c6f87;
        }

        /* подвал */
        .footer-note {
            text-align: center;
            margin-top: 3.5rem;
            font-size: 0.8rem;
            color: #6c86a0;
            border-top: 1px solid rgba(97, 125, 138, 0.2);
            padding-top: 1.8rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .hero h1 {
                font-size: 2rem;
            }
            .sites-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .cat-btn {
                padding: 6px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="hero">
        <h1>
            <i class="fas fa-compass"></i> 
            Мой цифровой шлюз
        </h1>
        <p>Все важные сайты под рукой — быстрый доступ к рабочим, творческим и любимым ресурсам</p>
    </div>

    <div class="search-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Поиск по названию или описанию...">
        </div>
    </div>

    <div class="categories" id="categoryFilters">
        <!-- Категории будут сгенерированы через JS -->
    </div>

    <div id="sitesContainer" class="sites-grid">
        <!-- Карточки сайтов появятся динамически -->
    </div>
    <div class="footer-note">
        <i class="fas fa-thumbtack"></i> Нажми на карточку или кнопку перехода — твой личный стартер-пак
    </div>
</div>

<script>
    // ----------------------------------------------
    // БАЗА ДАННЫХ ВАШИХ САЙТОВ (полностью редактируемая)
    // Добавьте, удалите или измените любые сайты под свои нужды
    // ----------------------------------------------
    const sitesData = [
        {
            id: 1,
            name: "GitHub",
            url: "https://github.com",
            description: "Крупнейшая платформа для разработки, совместной работы и хранения кода.",
            category: "Разработка",
            icon: "fab fa-github"
        },
        {
            id: 2,
            name: "Figma",
            url: "https://figma.com",
            description: "Дизайн интерфейсов, прототипирование и работа в команде.",
            category: "Дизайн",
            icon: "fab fa-figma"
        },
        {
            id: 3,
            name: "Notion",
            url: "https://notion.so",
            description: "База знаний, заметки, вики и планирование проектов.",
            category: "Продуктивность",
            icon: "fas fa-brain"
        },
        {
            id: 4,
            name: "YouTube",
            url: "https://youtube.com",
            description: "Видеохостинг с обучающими курсами, музыкой и развлечениями.",
            category: "Медиа",
            icon: "fab fa-youtube"
        },
        {
            id: 5,
            name: "Stack Overflow",
            url: "https://stackoverflow.com",
            description: "Сообщество программистов: вопросы, ответы и код-ревью.",
            category: "Разработка",
            icon: "fab fa-stack-overflow"
        },
        {
            id: 6,
            name: "Dribbble",
            url: "https://dribbble.com",
            description: "Вдохновение и портфолио дизайнеров со всего мира.",
            category: "Дизайн",
            icon: "fab fa-dribbble"
        },
        {
            id: 7,
            name: "Trello",
            url: "https://trello.com",
            description: "Канбан-доски для управления задачами и командной работы.",
            category: "Продуктивность",
            icon: "fab fa-trello"
        },
        {
            id: 8,
            name: "Spotify",
            url: "https://spotify.com",
            description: "Музыка, подкасты и плейлисты для фокуса и отдыха.",
            category: "Медиа",
            icon: "fab fa-spotify"
        },
        {
            id: 9,
            name: "MDN Web Docs",
            url: "https://developer.mozilla.org",
            description: "Исчерпывающая документация по HTML, CSS, JavaScript и веб-API.",
            category: "Разработка",
            icon: "fab fa-firefox"
        },
        {
            id: 10,
            name: "Canva",
            url: "https://canva.com",
            description: "Графический редактор для быстрого создания макетов и соцсетей.",
            category: "Дизайн",
            icon: "fas fa-palette"
        },
        {
            id: 11,
            name: "Gmail",
            url: "https://mail.google.com",
            description: "Почтовый сервис и календарь от Google.",
            category: "Продуктивность",
            icon: "fas fa-envelope"
        },
        {
            id: 12,
            name: "Netflix",
            url: "https://netflix.com",
            description: "Фильмы, сериалы и документальное кино для отдыха.",
            category: "Медиа",
            icon: "fab fa-netflix"
        },
        {
            id: 13,
            name: "ChatGPT",
            url: "https://chat.openai.com",
            description: "AI-помощник для генерации идей, кода и текстов.",
            category: "Инструменты",
            icon: "fas fa-robot"
        },
        {
            id: 14,
            name: "Figma Community",
            url: "https://figma.com/community",
            description: "Готовые UI-киты, плагины и шаблоны для Figma.",
            category: "Дизайн",
            icon: "fas fa-shapes"
        },
        {
            id: 15,
            name: "Linear",
            url: "https://linear.app",
            description: "Трекинг задач и менеджмент проектов для команд разработки.",
            category: "Продуктивность",
            icon: "fas fa-chart-line"
        }
    ];

    // получить уникальные категории, отсортированные
    function getUniqueCategories() {
        const catsSet = new Set(sitesData.map(site => site.category));
        // приоритет: сначала популярные разделы, но просто сортировка по алфавиту
        return Array.from(catsSet).sort((a,b) => a.localeCompare(b));
    }

    // глобальные переменные
    let activeCategory = "Все";
    let searchQuery = "";

    // рендер категорий (кнопки-фильтры)
    function renderCategories() {
        const categories = getUniqueCategories();
        const filterContainer = document.getElementById("categoryFilters");
        if (!filterContainer) return;
        
        let buttonsHtml = `<button class="cat-btn active" data-category="Все"><i class="fas fa-globe"></i> Все</button>`;
        categories.forEach(cat => {
            buttonsHtml += `<button class="cat-btn" data-category="${escapeHtml(cat)}"><i class="fas fa-tag"></i> ${escapeHtml(cat)}</button>`;
        });
        filterContainer.innerHTML = buttonsHtml;
        
        // добавить обработчики на кнопки
        document.querySelectorAll(".cat-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const category = btn.getAttribute("data-category");
                if (!category) return;
                // обновить активный класс
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeCategory = category;
                renderSites();
            });
        });
    }

    // простая защита от XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // фильтрация сайтов на основе активной категории и поискового запроса
    function getFilteredSites() {
        let filtered = [...sitesData];
        
        // фильтр по категории (если не "Все")
        if (activeCategory !== "Все") {
            filtered = filtered.filter(site => site.category === activeCategory);
        }
        
        // фильтр по поиску (название или описание)
        if (searchQuery.trim() !== "") {
            const queryLower = searchQuery.trim().toLowerCase();
            filtered = filtered.filter(site => 
                site.name.toLowerCase().includes(queryLower) || 
                site.description.toLowerCase().includes(queryLower)
            );
        }
        return filtered;
    }

    // генерация карточек
    function renderSites() {
        const container = document.getElementById("sitesContainer");
        if (!container) return;
        
        const filtered = getFilteredSites();
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-map-signs"></i>
                    <p>Ничего не найдено 😕 <br> Попробуйте другой запрос или категорию</p>
                </div>
            `;
            return;
        }
        
        let cardsHtml = "";
        for (let site of filtered) {
            // безопасное экранирование для динамических полей
            const safeName = escapeHtml(site.name);
            const safeDesc = escapeHtml(site.description);
            const safeUrl = escapeHtml(site.url);
            const safeCategory = escapeHtml(site.category);
            // иконка: если fab fa-... или fas fa-... оставляем как есть, но проверим чтобы не было ошибок
            let iconClass = site.icon;
            if (!iconClass) iconClass = "fas fa-link";
            
            cardsHtml += `
                <div class="site-card" data-url="${safeUrl}">
                    <div class="card-header">
                        <div class="icon-bg">
                            <i class="${iconClass}"></i>
                        </div>
                        <div class="card-title">
                            <h3>${safeName}</h3>
                            <span class="category-tag"><i class="fas fa-folder-open"></i> ${safeCategory}</span>
                        </div>
                    </div>
                    <div class="site-description">
                        ${safeDesc}
                    </div>
                    <div class="site-url">
                        <i class="fas fa-link"></i> ${safeUrl}
                    </div>
                    <div class="card-footer">
                        <button class="visit-btn" data-url="${safeUrl}">
                            Перейти <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
        }
        
        container.innerHTML = cardsHtml;
        
        // добавить обработчики на кнопки и на всю карточку (клик по карточке тоже открывает)
        document.querySelectorAll(".visit-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const url = btn.getAttribute("data-url");
                if (url) window.open(url, "_blank", "noopener,noreferrer");
            });
        });
        
        document.querySelectorAll(".site-card").forEach(card => {
            card.addEventListener("click", (e) => {
                // если клик был не по кнопке, открываем ссылку
                const target = e.target;
                if (target.closest('.visit-btn')) return;
                const url = card.getAttribute("data-url");
                if (url) window.open(url, "_blank", "noopener,noreferrer");
            });
        });
    }

    // слушатель для поля поиска
    function bindSearch() {
        const searchInput = document.getElementById("searchInput");
        if (!searchInput) return;
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderSites();
        });
    }
    
    // дополнительная функция для быстрого добавления нового сайта (для демо - необязательно), 
    // но можно раскомментировать, если вы хотите динамически добавлять через консоль. Оставляем для гибкости:
    window.addNewSite = function(siteObject) {
        // siteObject = { name, url, description, category, icon? }
        if(siteObject && siteObject.name && siteObject.url) {
            const newId = Date.now();
            const defaultIcon = "fas fa-star";
            sitesData.push({
                id: newId,
                name: siteObject.name,
                url: siteObject.url,
                description: siteObject.description || "Новый сайт в коллекции",
                category: siteObject.category || "Другое",
                icon: siteObject.icon || defaultIcon
            });
            // обновляем фильтры категорий и рендер
            renderCategories();
            renderSites();
        } else {
            console.warn("Неверный формат сайта для добавления");
        }
    };
    
    // простая инициализация
    function init() {
        renderCategories();
        renderSites();
        bindSearch();
    }
    
    init();
</script>
</body>
</html>
